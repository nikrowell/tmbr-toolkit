<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>@tmbr/video</title>

</head>
<body>

<main class="min-h-screen max-w-[900px] grid place-content-center mx-auto p-10">

  <div data-video>

    <video loop muted autoplay playsinline src="https://player.vimeo.com/progressive_redirect/playback/169370762/rendition/720p/file.mp4?loc=external&log_user=0&signature=78f1c83218f08df01a7444fdb47a9ab02eebdd0ad6041e2630d6342512f37fc7"></video>

    <div class="mt-3 mb-3 flex gap-4 items-center">

      <div class="flex gap-2 items-center">
        <button type="button" data-video-toggle>Toggle</button>
        <button type="button" data-video-mute>Mute</button>
      </div>

      <div class="flex-1 h-2.5 bg-gray-200 overflow-hidden" data-video-progress>
        <div class="bg-blue-500 size-full origin-left scale-x-[var(--video-progress)]"></div>
      </div>

      <div class="font-mono text-sm text-gray-500 select-none">
        <span data-video-time>0:00</span> / <span data-video-duration></span>
      </div>

      <div class="flex gap-2 items-center">
        <button type="button" data-video-skip="-5">-5s</button>
        <button type="button" data-video-skip="10">+10s</button>
      </div>

    </div>

    <input type="range" min="0" max="1" step="0.01" class="w-1/3 h-2 bg-gray-200 appearance-none" data-video-volume>

  </div>

</main>

<script type="module">
import Video from './index.js';

const video = new Video(document.querySelector('[data-video]'), {
  // skip : 15,
});

</script>

<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<style type="text/tailwindcss">
@layer base {
  button {
    @apply text-base bg-gray-200 font-medium px-4 py-2 rounded-sm cursor-pointer hover:bg-gray-300 transition-colors;
  }
  button:disabled {
    @apply bg-gray-100 text-gray-400 cursor-not-allowed;
  }
}
</style>

</body>
</html>
